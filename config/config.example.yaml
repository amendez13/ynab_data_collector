# YNAB Data Collector Configuration
# Copy this file to config.yaml and fill in your values:
#   cp config/config.example.yaml config/config.yaml
#
# WARNING: config.yaml contains sensitive data and should NOT be committed to git
#
# NOTE: API tokens should NEVER be stored in this file.
#       Set YNAB_API_TOKEN environment variable instead (see .env.example)

# YNAB API settings
ynab:
  # YNAB API base URL (default: https://api.ynab.com/v1)
  base_url: "https://api.ynab.com/v1"

  # Budget ID to use for data extraction
  # Use "last-used" for your default budget, or specify a budget ID
  # Find your budget ID at: https://app.ynab.com (look at URL after /budget/)
  budget_id: "last-used"

# Output settings
# Directory where exported files will be saved
output_directory: "./output"

# Application settings
app:
  # Enable debug mode (more verbose logging)
  debug: false

  # Logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_level: INFO

  # Log file path (optional, logs to console if not set)
  # log_file: logs/app.log

# Processing settings
processing:
  # Maximum concurrent operations
  max_workers: 4

  # Batch size for bulk operations
  batch_size: 100

  # Enable dry run mode (no actual changes)
  dry_run: false
